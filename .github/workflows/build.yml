name: Build Codex IPA (Unsigned)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned archive
        run: |
          xcodebuild \
          -project Codex.xcodeproj \
          -scheme Codex \
          -configuration Release \
          -sdk iphoneos \
          -archivePath $PWD/build/Codex.xcarchive \
          archive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          DEVELOPMENT_TEAM=""

      - name: Extract .app
        run: |
          mkdir -p Payload
          cp -R build/Codex.xcarchive/Products/Applications/Codex.app Payload/

      - name: Create IPA
        run: |
          zip -r Codex.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Codex-unsigned-ipa
          path: Codex.ipa

      - name: Upload archive (optional)
        uses: actions/upload-artifact@v4
        with:
          name: Codex-xcarchive
          path: build/Codex.xcarchive
